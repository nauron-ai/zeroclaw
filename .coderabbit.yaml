# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit configuration for ZeroClaw
# Documentation: https://docs.coderabbit.ai/reference/configuration

language: en-US
early_access: false

# Enable tone control for reviews
reviews:
  # Request changes workflow
  request_changes_workflow: false
  
  # High level summary of the PR
  high_level_summary: true
  
  # Generate sequence diagrams
  sequence_diagrams: true
  
  # Auto-review configuration
  auto_review:
    enabled: true
    # Only review PRs targeting these branches
    base_branches:
      - main
      - dev
    # Skip reviews for draft PRs or WIP
    drafts: false
    # Enable base branch analysis
    base_branch_analysis: true
  
  # Poem feature toggle (must be a boolean, not an object)
  poem: false
  
  # Reviewer suggestions
  reviewer:
    # Suggest reviewers based on blame data
    enabled: true
    # Automatically assign suggested reviewers
    auto_assign: false

  # Tools configuration
  tools:
    # Rust-specific tools
    cargo:
      enabled: true

  # Path filters - ignore generated files
  path_filters:
    - "!**/target/**"
    - "!**/node_modules/**"
    - "!**/.cargo/**"
    - "!**/Cargo.lock"

  # General review instructions
  path_instructions:
    - path: "**/*.rs"
      instructions: |
        Prioritize separation of concerns and clear domain boundaries.
        Prefer encapsulation and cohesive modules over ad-hoc helpers.
        Flag primitive obsession: raw strings, tuples, booleans, or loosely shaped maps should not carry domain meaning when a named type or enum would make the design clearer.
        Prefer conversions and normalization to live at boundaries instead of being scattered through callers.
        Keep module roots thin and avoid growing large legacy files; prefer extracting focused submodules.
        New files should stay roughly under 250 LOC unless there is a strong reason not to.
        Flag wrappers that add no semantic value.
        Prefer explicit, typed APIs and clear boundaries between domain, transport, storage, and configuration layers.
  
  # Enable finishing touches
  finishing_touches:
    # Generate docstrings
    docstrings:
      enabled: true
    # Generate unit tests
    unit_tests:
      enabled: true

# Chat configuration
chat:
  auto_reply: true
