name: Pub Release

on:
    push:
        tags: ["v*"]
    workflow_dispatch:
        inputs:
            release_ref:
                description: "Git ref (branch, tag, or SHA) to build"
                required: false
                default: "main"
                type: string
            publish_release:
                description: "Publish a GitHub release (false = verification build only)"
                required: false
                default: false
                type: boolean
            release_tag:
                description: "Release tag to create when publish_release=true, e.g. v0.1.9-0001"
                required: false
                default: ""
                type: string
            draft:
                description: "Create release as draft (manual publish only)"
                required: false
                default: true
                type: boolean
    schedule:
        - cron: "17 8 * * 1"

concurrency:
    group: pub-release-${{ github.ref || github.run_id }}
    cancel-in-progress: true

permissions:
    contents: write

env:
    GIT_CONFIG_COUNT: "1"
    GIT_CONFIG_KEY_0: core.hooksPath
    GIT_CONFIG_VALUE_0: /dev/null
    CARGO_TERM_COLOR: always
    RELEASE_TARGET: x86_64-unknown-linux-gnu
    RELEASE_ARCHIVE: labaclaw-x86_64-unknown-linux-gnu.tar.gz

jobs:
    prepare:
        name: Prepare Release Context
        runs-on: ubuntu-22.04
        outputs:
            release_ref: ${{ steps.vars.outputs.release_ref }}
            release_tag: ${{ steps.vars.outputs.release_tag }}
            publish_release: ${{ steps.vars.outputs.publish_release }}
            draft_release: ${{ steps.vars.outputs.draft_release }}
            prerelease_release: ${{ steps.vars.outputs.prerelease_release }}
        steps:
            - name: Resolve release inputs
              id: vars
              shell: bash
              run: |
                  set -euo pipefail

                  event_name="${GITHUB_EVENT_NAME}"
                  release_ref="main"
                  release_tag="verify-${GITHUB_SHA::12}"
                  publish_release="false"
                  draft_release="false"
                  prerelease_release="false"

                  if [[ "$event_name" == "push" ]]; then
                    release_ref="${GITHUB_REF_NAME}"
                    release_tag="${GITHUB_REF_NAME}"
                    publish_release="true"
                  elif [[ "$event_name" == "workflow_dispatch" ]]; then
                    release_ref="${{ inputs.release_ref }}"
                    publish_release="${{ inputs.publish_release }}"
                    draft_release="${{ inputs.draft }}"

                    if [[ -z "$release_ref" ]]; then
                      release_ref="main"
                    fi

                    if [[ "$publish_release" == "true" ]]; then
                      release_tag="${{ inputs.release_tag }}"
                      if [[ -z "$release_tag" ]]; then
                        echo "::error::release_tag is required when publish_release=true"
                        exit 1
                      fi
                    fi
                  fi

                  if [[ "$publish_release" == "true" && "$release_tag" == *-* ]]; then
                    prerelease_release="true"
                  fi

                  {
                    echo "release_ref=${release_ref}"
                    echo "release_tag=${release_tag}"
                    echo "publish_release=${publish_release}"
                    echo "draft_release=${draft_release}"
                    echo "prerelease_release=${prerelease_release}"
                  } >> "$GITHUB_OUTPUT"

            - name: Summarize release context
              shell: bash
              run: |
                  {
                    echo "### Release Context"
                    echo "- event: ${GITHUB_EVENT_NAME}"
                    echo "- release_ref: ${{ steps.vars.outputs.release_ref }}"
                    echo "- release_tag: ${{ steps.vars.outputs.release_tag }}"
                    echo "- publish_release: ${{ steps.vars.outputs.publish_release }}"
                    echo "- draft_release: ${{ steps.vars.outputs.draft_release }}"
                    echo "- prerelease_release: ${{ steps.vars.outputs.prerelease_release }}"
                    echo "- target: ${RELEASE_TARGET}"
                  } >> "$GITHUB_STEP_SUMMARY"

    build-release:
        name: Build Linux amd64
        needs: [prepare]
        runs-on: ubuntu-22.04
        timeout-minutes: 45
        env:
            CARGO_HOME: ${{ github.workspace }}/.ci-rust/${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}/cargo
            RUSTUP_HOME: ${{ github.workspace }}/.ci-rust/${{ github.run_id }}-${{ github.run_attempt }}-${{ github.job }}/rustup
            CARGO_TARGET_DIR: ${{ github.workspace }}/target
        steps:
            - name: Checkout
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  ref: ${{ needs.prepare.outputs.release_ref }}

            - name: Ensure C toolchain
              shell: bash
              run: bash ./scripts/ci/ensure_c_toolchain.sh

            - name: Self-heal Rust toolchain cache
              shell: bash
              run: ./scripts/ci/self_heal_rust_toolchain.sh 1.94.0

            - name: Setup Rust
              uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
              with:
                  toolchain: 1.94.0
                  targets: ${{ env.RELEASE_TARGET }}

            - name: Ensure C toolchain for Rust builds
              shell: bash
              run: ./scripts/ci/ensure_cc.sh

            - name: Cache Cargo registry and target
              uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v3
              with:
                  prefix-key: pub-release
                  shared-key: ${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
                  cache-targets: true
                  cache-bin: false

            - name: Build release
              shell: bash
              run: cargo build --profile release-fast --locked --target "${RELEASE_TARGET}" --package labaclaw --bin labaclaw

            - name: Verify binary format
              shell: bash
              run: |
                  set -euo pipefail
                  binary="target/${RELEASE_TARGET}/release-fast/labaclaw"
                  info="$(file "$binary")"
                  echo "$info"
                  [[ "$info" == *"ELF 64-bit"* && "$info" == *"x86-64"* ]] || {
                    echo "::error::Expected ELF x86_64 binary, got: ${info}"
                    exit 1
                  }

            - name: Package release
              shell: bash
              run: |
                  set -euo pipefail
                  tar -C "target/${RELEASE_TARGET}/release-fast" -czf "${RELEASE_ARCHIVE}" labaclaw
                  sha256sum "${RELEASE_ARCHIVE}" > SHA256SUMS

            - name: Upload release artifacts
              uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
              with:
                  name: labaclaw-release-linux-amd64
                  path: |
                      ${{ env.RELEASE_ARCHIVE }}
                      SHA256SUMS
                  if-no-files-found: error
                  retention-days: 7

    publish:
        name: Publish Release
        if: needs.prepare.outputs.publish_release == 'true'
        needs: [prepare, build-release]
        runs-on: ubuntu-22.04
        steps:
            - name: Download release artifacts
              uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
              with:
                  name: labaclaw-release-linux-amd64
                  path: artifacts

            - name: Generate release notes
              shell: bash
              env:
                  RELEASE_REF: ${{ needs.prepare.outputs.release_ref }}
                  RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
              run: |
                  set -euo pipefail
                  cat > artifacts/release-notes.md <<EOF
                  # labaclaw release

                  - Release tag: \`${RELEASE_TAG}\`
                  - Source ref: \`${RELEASE_REF}\`
                  - Target: \`${RELEASE_TARGET}\`
                  - Assets:
                    - \`${RELEASE_ARCHIVE}\`
                    - \`SHA256SUMS\`

                  Verify on the host:

                  \`\`\`bash
                  sha256sum -c SHA256SUMS
                  tar -xzf ${RELEASE_ARCHIVE}
                  file labaclaw
                  \`\`\`
                  EOF

            - name: Create GitHub Release
              uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
              with:
                  tag_name: ${{ needs.prepare.outputs.release_tag }}
                  draft: ${{ needs.prepare.outputs.draft_release == 'true' }}
                  prerelease: ${{ needs.prepare.outputs.prerelease_release == 'true' }}
                  body_path: artifacts/release-notes.md
                  files: |
                      artifacts/${{ env.RELEASE_ARCHIVE }}
                      artifacts/SHA256SUMS
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
